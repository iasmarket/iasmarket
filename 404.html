<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting… — IaSmarKet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root{--hot:#FF2D55;--teal:#00E5C8;--dark:#0C0D12;--card:#1A1B27;--border:rgba(255,255,255,0.07);--text:#F2F2F5;--muted:#8A8BA8;}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:"DM Sans",sans-serif;background:var(--dark);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
        body::before{content:"";position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 900px 600px at 10% 10%,rgba(255,45,85,0.08) 0%,transparent 70%),radial-gradient(ellipse 700px 700px at 90% 80%,rgba(0,229,200,0.06) 0%,transparent 70%);pointer-events:none;}
        .box{position:relative;z-index:1;text-align:center;max-width:480px;}
        .logo{font-family:"Syne",sans-serif;font-weight:900;font-size:1.4rem;background:linear-gradient(90deg,var(--hot),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;display:inline-block;margin-bottom:32px;}
        .spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--hot);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 24px;}
        @keyframes spin{to{transform:rotate(360deg)}}
        h1{font-family:"Syne",sans-serif;font-weight:900;font-size:1.5rem;margin-bottom:10px;}
        p{color:var(--muted);font-size:0.92rem;line-height:1.6;}
        .btn{display:inline-flex;align-items:center;gap:8px;margin-top:28px;background:linear-gradient(135deg,#FF9900,#e68800);color:#fff;font-family:"Syne",sans-serif;font-weight:800;font-size:0.9rem;padding:12px 28px;border-radius:12px;text-decoration:none;transition:opacity 0.2s;}
        .btn:hover{opacity:0.85;}
        .not-found{display:none;}
        .not-found h1{font-size:5rem;background:linear-gradient(135deg,var(--hot),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;}
        .not-found p{margin-bottom:4px;}
        .btn-home{display:inline-flex;align-items:center;gap:8px;margin-top:28px;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:"Syne",sans-serif;font-weight:700;font-size:0.9rem;padding:12px 28px;border-radius:12px;text-decoration:none;}
    </style>
</head>
<body>
<div class="box" id="redirecting">
    <a href="https://www.iasmarket.us" class="logo">IaSmarKet.us</a>
    <div class="spinner"></div>
    <h1>Redirecting to Amazon…</h1>
    <p>You will be redirected to the Amazon product page in a moment.</p>
    <a href="#" class="btn" id="manualLink">Go Now →</a>
</div>

<div class="box not-found" id="notFound">
    <a href="https://www.iasmarket.us" class="logo">IaSmarKet.us</a>
    <div class="not-found">
        <h1>404</h1>
        <p>This page doesn't exist.</p>
        <p>Looking for Amazon deals? Visit our homepage.</p>
        <a href="https://www.iasmarket.us" class="btn-home">🏠 Back to IaSmarKet</a>
    </div>
</div>

<script>
    const AFFILIATE_TAG = 'eloabder-20';
    const ASIN_RE = /^\/([A-Z0-9]{10})\/?$/i;

    const path = window.location.pathname;
    const match = path.match(ASIN_RE);

    if (match) {
        const asin = match[1].toUpperCase();
        const dest = 'https://www.amazon.com/dp/' + asin + '?tag=' + AFFILIATE_TAG;

        document.getElementById('manualLink').href = dest;

        // Redirect immediately
        window.location.replace(dest);
    } else {
        // Not an ASIN path — show 404
        document.getElementById('redirecting').style.display = 'none';
        document.getElementById('notFound').style.display = 'block';
        document.title = '404 — IaSmarKet';
    }
</script>
</body>
</html>
